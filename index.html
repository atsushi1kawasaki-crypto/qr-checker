<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRコード連番＆ユニークキーチェッカー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    html, body {
      position: fixed;
      overflow: hidden;
      width: 100%;
      height: 100%;
      touch-action: none;
      margin: 0;
      padding: 0;
      background-color: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #f0f6fc;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
      padding: 6px;
    }

    /* ⭐画質を落とさないために、カメラエリアを画面の45%まで広げて確保 */
    .video-container {
      position: relative;
      width: 100%;
      height: 45vh;
      background-color: #000;
      border: 3px solid #003A8C;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .torch-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background-color: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid #fff;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      z-index: 10;
    }

    /* ボタンのスキマを詰めてコンパクトに */
    .main-btn {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 15px;
      font-weight: bold;
      background-color: #003A8C;
      color: white;
      border: none;
      border-radius: 8px;
    }

    /* 情報ボックスを少しスリムにして、文字が下にはみ出さないようにガード */
    .card {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      min-height: 0; 
    }

    .card-title {
      font-size: 13px;
      font-weight: bold;
      color: #58a6ff;
      border-bottom: 1px solid #30363d;
      padding-bottom: 2px;
      margin: 0;
      display: flex;
      justify-content: space-between;
    }

    .status-badge {
      background-color: #d29922;
      color: #0d1117;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 2px 0;
      font-size: 12px;
    }

    .val-large {
      font-size: 18px;
      font-weight: bold;
      color: #d29922;
    }
    .val-num {
      font-size: 18px;
      font-weight: bold;
      color: #3fb950;
    }

    .val-key {
      font-size: 13px;
      font-family: monospace;
      color: #58a6ff;
      word-break: break-all;
      white-space: normal;
      text-align: right;
      max-width: 65%;
    }

    .msg-box {
      background-color: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      padding: 6px;
      border-radius: 6px;
      color: #d29922;
      font-size: 11px;
      text-align: center;
    }

    .settings-box {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 6px;
      margin-top: 6px;
    }
    .tab-container {
      display: flex;
      gap: 6px;
    }
    .tab {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      font-weight: bold;
      background-color: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .tab.active {
      background-color: #238636;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <div class="container" id="mainContainer">
    <div class="video-container">
      <button class="torch-btn" id="torchBtn" onclick="toggleTorch()">ライト: OFF</button>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <button class="main-btn" onclick="confirmSettings()">設定を確定して本番開始</button>

    <div class="card">
      <div class="card-title">
        <span>読み取り状況</span>
        <span class="status-badge" id="statusBadge">抽出ルール設定中</span>
      </div>
      <div class="row">
        <span>次に来る番号:</span>
        <span class="val-large" id="nextNum">未登録</span>
      </div>
      <div class="row">
        <span>読んだ連番数値:</span>
        <span class="val-num" id="scannedNum">-</span>
      </div>
      <div class="row" style="align-items: flex-start;">
        <span>固定ユニークキー:</span>
        <span class="val-key" id="uniqueKey">QRをかざしてください</span>
      </div>
      <div class="msg-box" id="msgBox">
        【設定受付中】位置を決定したら、<br>上の確定ボタンを押してください。
      </div>
    </div>

    <div class="settings-box">
      <div class="tab-container">
        <button class="tab active">連番設定</button>
        <button class="tab">ユニークキー設定</button>
      </div>
    </div>
  </div>

  <script>
    let stream = null;
    let track = null;
    let isTorchOn = false;
    let video = null;
    let canvas = null;
    let ctx = null;
    let lastQR = "";

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    document.getElementById('mainContainer').addEventListener('click', () => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    });

    async function startCamera() {
      video = document.getElementById('video');
      canvas = document.getElementById('canvas');
      ctx = canvas.getContext('2d', { willReadFrequently: true });

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, // ⚙️最高画質に設定
          audio: false
        });
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];
        video.addEventListener('loadedmetadata', () => {
          requestAnimationFrame(tick);
        });
      } catch (err) {
        console.error("カメラ起動エラー:", err);
      }
    }

    function tick() {
      if (video.readyState === video.HAVE_CURRENT_DATA) {
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: "dontInvert",
        });

        if (code) {
          if (lastQR !== code.data) {
            lastQR = code.data;
            playBeep();
            document.getElementById('uniqueKey').innerText = code.data;
            
            if (code.data.length >= 2) {
              const numPart = code.data.slice(-2);
              if (!isNaN(numPart)) {
                document.getElementById('scannedNum').innerText = numPart;
              } else {
                document.getElementById('scannedNum').innerText = "--";
              }
            }
          }
        }
      }
      requestAnimationFrame(tick);
    }

    async function toggleTorch() {
      if (!track) return;
      try {
        isTorchOn = !isTorchOn;
        await track.applyConstraints({ advanced: [{ torch: isTorchOn }] });
        document.getElementById('torchBtn').innerText = isTorchOn ? "ライト: ON" : "ライト: OFF";
      } catch (err) {
        alert("この端末はライト制御に対応していません");
      }
    }

    function confirmSettings() {
      playBeep();
      document.getElementById('statusBadge').innerText = "本番チェック中";
      document.getElementById('statusBadge').style.backgroundColor = "#238636";
      document.getElementById('msgBox').innerText = "【本番稼働中】連番チェックを行っています。";
      alert("設定を確定しました！本番チェックを開始します。");
    }

    window.onload = startCamera;
  </script>
</body>
</html>
