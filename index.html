<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRコード連番＆ユニークキーチェッカー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* iPhoneのバウンド・横ブレを完全にロックし、1画面に収める */
    html, body {
      position: fixed;
      overflow: hidden;
      width: 100%;
      height: 100%;
      touch-action: none;
      margin: 0;
      padding: 0;
      background-color: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #f0f6fc;
    }

    /* 全体を縦並びにして画面内に均等配置 */
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
      padding: 8px;
      justify-content: space-between;
    }

    /* カメラエリア：画面全体の高さを圧迫しないよう「最大35%」に制限 */
    .video-container {
      position: relative;
      width: 100%;
      height: 35vh;
      max-height: 35vh;
      background-color: #000;
      border: 3px solid #003A8C; /* TOPPANブルー */
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ライトボタンをカメラの右上に配置 */
    .torch-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background-color: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid #fff;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      z-index: 10;
    }

    /* 確定ボタン */
    .main-btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background-color: #003A8C; /* TOPPANブルー */
      color: white;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .main-btn:active { background-color: #002252; }

    /* 情報表示ボックス */
    .card {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 10px;
      flex-grow: 1;
      margin: 6px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-title {
      font-size: 14px;
      font-weight: bold;
      color: #58a6ff;
      border-bottom: 1px solid #30363d;
      padding-bottom: 4px;
      margin-top: 0;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .status-badge {
      background-color: #d29922;
      color: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0;
      font-size: 13px;
    }

    .val-large {
      font-size: 20px;
      font-weight: bold;
      color: #d29922;
    }
    .val-num {
      font-size: 20px;
      font-weight: bold;
      color: #3fb950;
    }

    /* ⭐ここが最重要！47桁の文字を絶対に省略せず、きれいに折り返して全表示 */
    .val-key {
      font-size: 14px;
      font-family: monospace;
      color: #58a6ff;
      word-break: break-all;
      white-space: normal;
      text-align: right;
      max-width: 60%;
    }

    .msg-box {
      background-color: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      padding: 8px;
      border-radius: 6px;
      color: #d29922;
      font-size: 12px;
      text-align: center;
      margin-top: 4px;
    }

    /* 下部設定エリア */
    .settings-box {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 8px;
    }
    .tab-container {
      display: flex;
      gap: 6px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      font-weight: bold;
      background-color: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .tab.active {
      background-color: #238636; /* TOPPANグリーン */
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <div class="container" id="mainContainer">
    <div class="video-container">
      <button class="torch-btn" id="torchBtn" onclick="toggleTorch()">ライト: OFF</button>
      <video id="video" autoplay playsinline muted></video>
    </div>

    <button class="main-btn" onclick="confirmSettings()">設定を確定して本番開始</button>

    <div class="card">
      <div class="card-title">
        <span>読み取り状況</span>
        <span class="status-badge">抽出ルール設定中</span>
      </div>
      <div class="row">
        <span>次に来る番号:</span>
        <span class="val-large">未登録</span>
      </div>
      <div class="row">
        <span>読んだ連番数値:</span>
        <span class="val-num" id="scannedNum">06</span>
      </div>
      <div class="row" style="align-items: flex-start;">
        <span>固定ユニークキー:</span>
        <span class="val-key" id="uniqueKey">E290760606A66A47LONGUNIQUEKEYSAMPLE1234567890123</span>
      </div>
      <div class="msg-box">
        【設定受付中】位置を決定したら、<br>上の確定ボタンを押してください。
      </div>
    </div>

    <div class="settings-box">
      <div class="tab-container">
        <button class="tab active">連番設定</button>
        <button class="tab">ユニークキー設定</button>
      </div>
    </div>
  </div>

  <script>
    let stream = null;
    let track = null;
    let isTorchOn = false;

    // 音声を鳴らす関数（画面を一度タップすると有効化されます）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(2000, audioCtx.currentTime); // ピピッという高音
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    // 初回タップ時に音声を有効化
    document.getElementById('mainContainer').addEventListener('click', () => {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });

    // カメラ起動
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];
      } catch (err) {
        console.error("カメラ起動エラー:", err);
      }
    }

    // ライトのON/OFF切り替え
    async function toggleTorch() {
      if (!track) return;
      try {
        isTorchOn = !isTorchOn;
        await track.applyConstraints({
          advanced: [{ torch: isTorchOn }]
        });
        document.getElementById('torchBtn').innerText = isTorchOn ? "ライト: ON" : "ライト: OFF";
      } catch (err) {
        alert("この端末はライト制御に対応していません");
      }
    }

    function confirmSettings() {
      playBeep(); // テスト確認用
      alert("設定を確定しました！本番チェックを開始します。");
    }

    window.onload = startCamera;
  </script>
</body>
</html>
